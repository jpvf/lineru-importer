services:
  mysql:
    image: mysql:8.0
    container_name: aurora-sync-mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_USER: ${MYSQL_USER:-syncuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    volumes:
      - ${MYSQL_DATA_PATH:-/Volumes/nvme/aurora-sync-mysql}:/var/lib/mysql:delegated
      - ./mysql.cnf:/etc/mysql/conf.d/aurora-sync.cnf
    networks:
      - aurora-sync
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: aurora-sync-app
    ports:
      - "${APP_PORT:-8090}:8090"
    env_file:
      - .env
    environment:
      LOCAL_HOST: mysql
      LOCAL_PORT: 3306
      DATABASE_PATH: /data/aurora_sync.db
    volumes:
      - ./data:/data
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - aurora-sync
    restart: unless-stopped

networks:
  aurora-sync:
    driver: bridge
